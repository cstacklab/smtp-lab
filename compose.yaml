name: smtp-lab

services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: smtp-lab-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_DATABASE: /data/mailpit.db
      MP_MAX_MESSAGES: "${MAILPIT_MAX_MESSAGES:-5000}"
      MP_VERBOSE: "${MAILPIT_VERBOSE:-false}"
    volumes:
      - mailpit-data:/data
    networks:
      - smtp-lab
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 15s
      start_period: 10s
      timeout: 30s
      retries: 3

networks:
  smtp-lab:
    name: smtp-lab

volumes:
  mailpit-data:
